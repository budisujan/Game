<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fighting Game Mobile UI</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #
              0;
            overflow: hidden;
            touch-action: none;
            font-family: sans-serif;
        }

        #invisible-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 999999;
            background-color: #121212;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            box-sizing: border-box;
        }

        /* layar game */
        .game-wrapper {
            position: relative;
            width: 300px;
            height: 200px;
            border: 5px solid #333;
            background: #56BFBF;
            border-radius: 10px;
            margin-top: 20px;
        }

        /* kontrol */
        .ui-controller-container {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 20px;
            box-sizing: border-box;
            margin-bottom: 20px;
        }

        /* Analog / Joystick */
        .analog-base {
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        #myCanvascontrol {
            border-radius: 50%;
           
        }

        /* tombl*/
        .action-group {
            display: flex;
            gap: 15px;
        }

        .btn-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .btn-kick { border-color: #4facfe; }
        .btn-punch { border-color: #ff416c; }

    </style>
</head>

    </div>

            <canvas id="myCanvascontrol" width="100" height="100"></canvas>
        </div>

        <div class="action-group">
            <div class="btn-circle btn-kick">
                <canvas id="myCanvaskick" width="80" height="80"></canvas>
            </div>
            <div class="btn-circle btn-punch">
                <canvas id="myCanvaspunch" width="80" height="80"></canvas>
            </div>
        </div>
    </div>
</div>

// tombol
canvaskick.addEventListener('touchstart', function(event) {
    if (coldown) {} else {
        if (nyentuh) {
            nyawamusuh-=10;
            gambarsemua();
            amin = "<<<BOOOMM!!>>>";
            setTimeout(()=>{ amin = ""; },600);
        }
        ancang= true;
        if (tukarpositi) { gambar.src= gamntt; } else { gambar.src = gamnnt; }
        coldown = true;
        setTimeout(()=>{ ancang = false; },500);
        setTimeout(()=>{ coldown = false; },1000);
    }
});

canvaspunch.addEventListener('touchstart', function(event) {
    if (coldown) {} else {
        if (nyentuh) {
            nyawamusuh-=7;
            gambarsemua();
            amin = "<<<POWW!!>>";
            setTimeout(()=>{ amin = ""; },600);
        }
        ancang= true;
        if (tukarpositi) { gambar.src= gamntp; } else { gambar.src = gamnnp; }
        setTimeout(()=>{ ancang = false; },500);
        coldown = true;
        setTimeout(()=>{ coldown = false; },1000);
    }
});

canvascontrol.addEventListener('touchmove', function(event) {
    var x = Math.floor((event.touches[0].pageX - canvascontrol.getBoundingClientRect().left)/80)*80;
    var y = Math.floor((event.touches[0].pageY - canvascontrol.getBoundingClientRect().top)/80)*80+50;
    const con = setInterval(()=> {
        ctxctrl.clearRect(0, 0, canvascontrol.width, canvascontrol.height);
        if (kotakx > x) { kotakx--; } else if (kotakx < x) { kotakx++; }
        if (kotaky > y) { kotaky--; } else if (kotaky < y) { kotaky++; }
        if (kotakx > 50) {
            if (karakterx>290) {} else { karakterx++; }
        } else if (kotakx < 50) {
            if (karakterx<0) {} else { karakterx--; }
        }
        if (kotaky < 50) {
            karaktery--;
            setTimeout(()=>{ clearInterval(con); },30);
        }
        gambarsemua();
    });  
    setTimeout(() => { clearInterval(con); },100);
});

canvascontrol.addEventListener('touchend', function(event) {
    setTimeout(()=>{
        kotakx = 50; kotaky = 50;
        gambarsemua();
    },200);
});

const grav = setInterval(()=>{
    if (karaktery>=190) {} else {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        karaktery++;
        gambarsemua();
    }
    if (enemyy>=190) {} else {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        enemyy++;
        gambarsemua();
    }
});

function gambarsemua () {
    ctxctrl.clearRect(0, 0, canvascontrol.width, canvascontrol.height);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Analog joystick
    ctxctrl.fillStyle = "white";
    ctxctrl.beginPath();
    ctxctrl.arc(kotakx, kotaky, 15, 0, Math.PI*2);
    ctxctrl.fill();

    ctx.fillStyle = "black";
    ctx.fillRect(karakterx,karaktery,0,-70);
    ctx.fillRect(enemyx,enemyy,0,-70);
    
    // Bar Nyawa
    ctx.fillStyle = "green";
    ctx.fillRect(0,0,nyawa,10);
    ctx.fillStyle = "red";
    ctx.fillRect(300,0,nyawamusuh*-1,10);
    
    ctx.drawImage(gambar,karakterx-20,karaktery, 60, -89);
    ctx.drawImage(gambare,enemyx-20,enemyy, 60, -89);
    ctx.drawImage(gambarp,pelurux-20,peluruy-10, 50, 50);

    if (karakterx<enemyx){ tukarpositi=false; } else { tukarpositi =true; }

    if (!ancang) {
        if (tukarpositi) {
            gambar.src = gamntn; gambare.src = gamftn;
        } else {
            gambar.src= gamnnn; gambare.src= gamfnn;
        }
    }

    if (Math.abs(karakterx-enemyx)<=50) {
        if (Math.round((karaktery-35)/100)*100 == Math.round((enemyy-35)/100)*100) {
            if (tukarpositi) { enemyx--; karakterx++; }
            else { enemyx++; karakterx--; }
            nyentuh = true;
        } else { nyentuh = false; }
    } else { nyentuh = false; }
}

// Logika Serangan Musuh
setInterval(()=>{
  if (selesai)  return;
    let macamserangan = (enemyx>270 || enemyx<0) ? 4 : Math.round(Math.random()*100);
    if (macamserangan%3 == 0) {
        ancang = true;
        gambare.src = tukarpositi ? gamftp : gamfnp;
        enemyy = karaktery; pelurux = enemyx; peluruy = enemyy-85;
        gambarsemua();
        const serangani = setInterval(()=>{
            if (karakterx > enemyx) { pelurux+=3; } else if (karakterx < enemyx) { pelurux-=3; }
            gambarsemua();
            if (Math.abs(karakterx-pelurux)<=20) {
                if (Math.round((karaktery-85)/100)*100 == Math.round(peluruy/100)*100) {
                    nyawa-=15; clearInterval(serangani);
                    peluruy = 999999999; pelurux = 999999999;
                    gambarsemua();
                }
            }
        });
        setTimeout(()=>{ clearInterval(serangani); peluruy = 999999999; ancang = false; gambarsemua(); },2000);
    } else {
        ancang = true;
        gambare.src = tukarpositi ? gamftt : gamfnt;
        const serangan = setInterval(()=>{
            if (karakterx > enemyx) { enemyx+=3; } else if (karakterx < enemyx) { enemyx-=3; }
            if (karaktery > enemyy) { enemyy+=3; } else if (karaktery < enemyy) { enemyy-=3; }
            gambarsemua();
            if (nyentuh) { nyawa-=10; clearInterval(serangan); }
            gambarsemua();
        });
        setTimeout(()=>{ clearInterval(serangan); gambarsemua(); ancang = false; },1500);
    }
},3000);

const menangkalah = setInterval(() => {
    ctx.fillStyle = "white";
    ctx.font = "bold 20px Arial";
    ctx.textAlign = "center";
    ctx.fillText(amin, canvas.width/2, 100);
  if (nyawa <= 0) {
            amin = "YOU LOSE";
            nyawa = 0;
   tampilkanPoseAkhir(gamnlose,gamfwin); 
        } else if (nyawamusuh <= 0)  {
            amin = "YOU WIN!";
            nyawamusuh = 0;
      tampilkanPoseAkhir(gamnwin, gamflose); 
        }
    if (selesai) {
      drawStatis();
        return;
    } 

    if (nyawa <= 0 || nyawamusuh <= 0) {
        selesai = true; 
        posisiXTerakhir = karakterx;
        posisiYTerakhir = 190;
        posisiEnemyXTerakhir = enemyx;
        posisiEnemyYTerakhir = 190;
        karakterx = -9999; enemyx = 9999;
        pelurux = 9999; peluruy = 9999;

        
        setTimeout(() => {
            resetGame();
        }, 3000);
    }
});
  function tampilkanPoseAkhir(imgP, imgE) {
    statisP.src = imgP;
    statisE.src = imgE;
}

function drawStatis() {
    if (statisP.complete) {
        ctx.drawImage(statisP, posisiXTerakhir - 20, posisiYTerakhir, 60, -89);
    }
    if (statisE.complete) {
        ctx.drawImage(statisE, posisiEnemyXTerakhir - 20, posisiEnemyYTerakhir, 60, -89);
    }
}
  function resetGame() {
   
    nyawa = 100;
    nyawamusuh = 100;
    karakterx = 50;
    karaktery = 50;
    enemyx = 250;
    enemyy = 50;
    selesai = false;
    amin = "";
    gambar.src = gamnnn;
    gambare.src = gamfnn;
    gambarsemua();
}
